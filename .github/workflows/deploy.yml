name: Deploy
on:
  push:
    branches: [main]

jobs:
  validate-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate chain ID (F-117)
        run: |
          ENV="${{ vars.DEPLOY_ENV }}"
          CHAIN="${{ vars.CHAIN_ID }}"
          if [ -z "$ENV" ] || [ -z "$CHAIN" ]; then
            echo "❌ DEPLOY_ENV and CHAIN_ID must be set"
            exit 1
          fi
          if [ "$ENV" = "testnet" ] && [ "$CHAIN" != "97" ]; then
            echo "❌ Testnet deploy must use CHAIN_ID=97"
            exit 1
          fi
          if [ "$ENV" = "mainnet" ] && [ "$CHAIN" != "56" ]; then
            echo "❌ Mainnet deploy must use CHAIN_ID=56"
            exit 1
          fi
          echo "✅ Chain ID $CHAIN valid for $ENV"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [validate-chain]
    timeout-minutes: 20
    environment: ${{ vars.DEPLOY_ENV }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Build and push image
        run: |
          gcloud builds submit \
            --tag "gcr.io/${{ vars.PROJECT_ID }}/mdaopay-backend:${{ github.sha }}" \
            backend/
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mdaopay-backend \
            --image "gcr.io/${{ vars.PROJECT_ID }}/mdaopay-backend:${{ github.sha }}" \
            --region "${{ vars.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 80 \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},CHAIN_ID=${{ vars.CHAIN_ID }}" \
            --set-secrets "PAYMASTER_PRIVATE_KEY=paymaster-key:latest"
