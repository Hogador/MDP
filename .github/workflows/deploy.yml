name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Build and push image
        run: |
          gcloud builds submit \
            --tag "gcr.io/${{ vars.PROJECT_ID }}/mdaopay-backend:${{ github.sha }}" \
            backend/
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mdaopay-backend \
            --image "gcr.io/${{ vars.PROJECT_ID }}/mdaopay-backend:${{ github.sha }}" \
            --region "${{ vars.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 80 \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},CHAIN_ID=${{ vars.CHAIN_ID }}" \
            --set-secrets "PAYMASTER_PRIVATE_KEY=paymaster-key:latest"
