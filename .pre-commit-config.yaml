repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: local
    hooks:
      - id: ktlint
        name: ktlint
        language: system
        entry: ktlint
        files: \.kt$
      - id: solhint
        name: solhint
        language: system
        entry: solhint
        files: \.sol$
      - id: eslint
        name: eslint
        language: system
        entry: eslint
        files: \.(ts|tsx)$
