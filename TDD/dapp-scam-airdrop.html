<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarsDAO Airdrop — Claim</title>
<style>
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; height: 100vh; align-items: center; }
  .browser-mockup { width: 100%; max-width: 480px; height: 80vh; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; border: 1px solid #e0e0e0; }
  .browser-bar { background: #f5f5f5; padding: 10px 15px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }
  .url-bar { flex: 1; background: #fff; padding: 5px 10px; border-radius: 6px; font-size: 12px; color: #666; border: 1px solid #e0e0e0; }
  .content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow-y: auto; }
  .logo { font-size: 28px; font-weight: 800; color: #FF6B00; margin-bottom: 10px; }
  .slogan { font-size: 16px; color: #666; margin-bottom: 30px; }
  .airdrop-box { background: #FFF3E0; padding: 20px; border-radius: 12px; border: 1px solid #FFE0B2; margin-bottom: 30px; width: 100%; box-sizing: border-box; }
  .amount { font-size: 32px; font-weight: 800; color: #FF6B00; }
  .btn-claim { background: #FF6B00; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 12px rgba(255,107,0,0.3); }
  .btn-claim:hover { transform: translateY(-2px); }
</style>
</head>
<body>

<div class="browser-mockup">
  <div class="browser-bar">
    <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
    <div class="url-bar">🔒 marsdao-airdrop-claim.com</div>
  </div>
  <div class="content">
    <div class="logo">MarsDAO Airdrop</div>
    <div class="slogan">Раздаём 10,000 MDAO для ранних пользователей</div>
    
    <div class="airdrop-box">
      <div style="font-size: 14px; color: #666; margin-bottom: 5px;">Ваш баланс:</div>
      <div class="amount">10,000 MDAO</div>
      <div style="font-size: 12px; color: #999; margin-top: 5px;">≈ $3,660</div>
    </div>

    <button class="btn-claim" id="claimBtn">Забрать награду</button>
  </div>
</div>

<script>
  document.getElementById('claimBtn').addEventListener('click', () => {
    window.location.href = 'mdaopay-connect-modal.html?type=scam';
  });
</script>

</body>
</html>
