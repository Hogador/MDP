services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"  # localhost-only: external tools, not 0.0.0.0
    environment:
      POSTGRES_DB: mdaopay
      POSTGRES_USER: mdaopay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # POSTGRES_PASSWORD_FILE: /run/secrets/db_password  # uncomment to use Docker secrets (overrides POSTGRES_PASSWORD)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdaopay -d mdaopay"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-backup:
    image: prodrigestivill/postgres-backup-local:14
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: mdaopay
      POSTGRES_USER: mdaopay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdaopay}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    volumes:
      - ./backups:/backups

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"  # localhost-only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  relay:
    build: ./relay
    ports:
      - "8787:8787"
    environment:
      - BACKEND_URL=http://backend:8080
      - RELAY_SECRET=${RELAY_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
