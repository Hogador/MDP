groups:
  - name: mdaopay
    rules:
      - alert: HighErrorRate
        expr: rate(mdaopay_errors_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on MDAOPay backend"
      
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(mdaopay_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on MDAOPay backend"
      
      - alert: PaymasterBalanceLow
        expr: mdaopay_paymaster_balance_bnb < 1.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Paymaster balance below 1.5 BNB"
