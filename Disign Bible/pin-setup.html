<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MDAOPay — PIN Setup</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="transitions.css">
<link rel="stylesheet" href="components.css">
<style>
  .pin-screen {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .pin-lock-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--accent-soft);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    animation: scaleIn 0.5s var(--spring);
  }
  .pin-lock-icon svg {
    stroke: var(--accent); stroke-width: 2; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
    width: 32px; height: 32px;
  }

  .pin-title {
    font-size: var(--fs-h2); font-weight: var(--fw-bold); color: var(--text);
    letter-spacing: var(--ls-tight);
    margin-bottom: 6px;
  }
  .pin-sub {
    font-size: var(--fs-body); color: var(--text2);
    line-height: var(--lh-relaxed);
    max-width: 280px;
    margin-bottom: 24px;
  }

  .pin-dots {
    display: flex; gap: 16px; justify-content: center;
    margin-bottom: 28px;
  }
  .pin-dots .dot {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.2s var(--ease-out);
  }
  .pin-dots .dot.filled {
    background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 8px rgba(255,107,0,0.4);
    transform: scale(1.1);
  }
  .pin-dots .dot.error {
    background: var(--danger); border-color: var(--danger);
    box-shadow: 0 0 8px rgba(255,77,109,0.4);
  }

  /* Custom keypad */
  .keypad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%; max-width: 280px;
  }
  .key {
    aspect-ratio: 1.4 / 1;
    background: var(--card);
    border: 1px solid var(--soft-border);
    border-radius: var(--r-lg);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: var(--fw-bold); color: var(--text);
    font-family: var(--font-mono);
    cursor: pointer;
    box-shadow: var(--shadow-soft), var(--shadow-glow);
    transition: transform 0.12s, box-shadow 0.18s;
    font-family: inherit;
    position: relative;
  }
  .key:active { transform: scale(0.94); box-shadow: var(--shadow-press); }
  .key .k-num { font-family: var(--font-mono); font-size: 26px; }
  .key .k-letters { font-size: 9px; color: var(--text2); font-weight: var(--fw-semibold); margin-top: 2px; letter-spacing: 1px; }
  .key.action {
    background: transparent; border: none; box-shadow: none;
    color: var(--text2);
  }
  .key.action svg {
    stroke: var(--text); stroke-width: 2; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
    width: 24px; height: 24px;
  }
  .key.action:active { color: var(--text); transform: scale(0.94); }
  .key.biometric svg { stroke: var(--accent); }

  /* Stage indicator */
  .stage {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: var(--r-pill);
    background: var(--tile);
    font-size: var(--fs-meta); color: var(--text2); font-weight: var(--fw-semibold);
    margin-bottom: 14px;
    box-shadow: var(--shadow-inset);
  }

  /* Step progress */
  .pin-steps {
    display: flex; gap: 6px;
    margin-bottom: 20px;
  }
  .pin-steps .ps-dot {
    width: 30px; height: 4px; border-radius: 2px;
    background: var(--tile);
    box-shadow: var(--shadow-inset);
    transition: background var(--d-base);
  }
  .pin-steps .ps-dot.active { background: var(--accent); }

  /* Shake animation */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-4px); }
  }
  .pin-dots.shake { animation: shake 0.4s var(--ease-out); }

  /* Bio toggle at bottom */
  .bio-option {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--soft-border);
    border-radius: var(--r-lg);
    padding: 14px 16px;
    box-shadow: var(--shadow-soft);
    margin-top: 16px; width: 100%; max-width: 280px;
    cursor: pointer;
  }
  .bio-option:active { transform: scale(0.99); }
  .bio-option .bo-icon {
    width: 36px; height: 36px; border-radius: var(--r-md);
    background: var(--accent-soft);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bio-option .bo-icon svg { stroke: var(--accent); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; width: 18px; height: 18px; }
  .bio-option .bo-body { flex: 1; text-align: left; }
  .bio-option .bo-title { font-size: var(--fs-body); font-weight: var(--fw-semibold); color: var(--text); }
  .bio-option .bo-sub { font-size: var(--fs-meta); color: var(--text2); margin-top: 1px; }
</style>
</head>
<body class="theme-dark">
<div class="phone theme-dark" id="phone">

  <div class="topbar">
    <button class="back-btn" id="backBtn" aria-label="Назад">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="title">PIN-код</div>
  </div>

  <div class="content-wrap" id="contentWrap" style="overflow:hidden;">

    <div class="pin-screen">
      <div class="pin-steps" id="pinSteps">
        <div class="ps-dot active"></div>
        <div class="ps-dot"></div>
      </div>

      <div class="pin-lock-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>

      <div class="stage" id="stage">Создание PIN</div>
      <div class="pin-title" id="pinTitle">Придумайте PIN</div>
      <div class="pin-sub" id="pinSub">6 цифр для защиты кошелька. PIN потребуется при каждом входе.</div>

      <div class="pin-dots" id="pinDots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="keypad" id="keypad">
        <button class="key" data-key="1"><span class="k-num">1</span></button>
        <button class="key" data-key="2"><span class="k-num">2</span><span class="k-letters">ABC</span></button>
        <button class="key" data-key="3"><span class="k-num">3</span><span class="k-letters">DEF</span></button>
        <button class="key" data-key="4"><span class="k-num">4</span><span class="k-letters">GHI</span></button>
        <button class="key" data-key="5"><span class="k-num">5</span><span class="k-letters">JKL</span></button>
        <button class="key" data-key="6"><span class="k-num">6</span><span class="k-letters">MNO</span></button>
        <button class="key" data-key="7"><span class="k-num">7</span><span class="k-letters">PQRS</span></button>
        <button class="key" data-key="8"><span class="k-num">8</span><span class="k-letters">TUV</span></button>
        <button class="key" data-key="9"><span class="k-num">9</span><span class="k-letters">WXYZ</span></button>
        <button class="key action biometric" id="bioBtn" aria-label="Биометрия">
          <svg viewBox="0 0 24 24"><path d="M12 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M3 21a9 9 0 0 1 18 0"/></svg>
        </button>
        <button class="key" data-key="0"><span class="k-num">0</span></button>
        <button class="key action" id="delBtn" aria-label="Удалить">
          <svg viewBox="0 0 24 24"><path d="M21 5H8L2 12l6 7h13a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"/><path d="M16 9l-5 5M11 9l5 5"/></svg>
        </button>
      </div>

      <button class="bio-option" id="bioOption" style="display:none;">
        <div class="bo-icon"><svg viewBox="0 0 24 24"><path d="M12 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M3 21a9 9 0 0 1 18 0"/></svg></div>
        <div class="bo-body">
          <div class="bo-title">Включить Face ID</div>
          <div class="bo-sub">Быстрый вход без ввода PIN</div>
        </div>
        <div class="toggle" id="bioToggle" data-toggle></div>
      </button>
    </div>
  </div>

  <!-- Notif zone -->
  <div class="notif-zone" id="notifZone" style="position:absolute;bottom:0;left:0;right:0;height:0;pointer-events:none;">
    <div class="notif-wave" id="notifWave"></div>
    <div class="notif" id="notif">
      <div class="notif-content">
        <div class="notif-row">
          <div class="notif-icon info" id="notifIcon"></div>
          <div class="notif-body">
            <div class="notif-title" id="notifTitle">Готово</div>
            <div class="notif-sub" id="notifSub"></div>
          </div>
        </div>
        <div class="notif-details">
          <div class="notif-amount" id="notifAmount"></div>
          <div class="notif-commission" id="notifCommission"></div>
        </div>
        <button class="notif-action" id="notifAction">Готово</button>
      </div>
    </div>
  </div>
</div>

<script src="notif.js"></script>
<script>
(function(){
  'use strict';
  MDAONotif.init();
  const phone = document.getElementById('phone');
  MDAONotif.bindThemeCycle(phone);

  const PIN_LENGTH = 6;
  let stage = 1; // 1 = create, 2 = confirm
  let pin = '';
  let firstPin = '';

  const dots = document.querySelectorAll('#pinDots .dot');
  const dotsContainer = document.getElementById('pinDots');
  const stageEl = document.getElementById('stage');
  const titleEl = document.getElementById('pinTitle');
  const subEl = document.getElementById('pinSub');
  const steps = document.querySelectorAll('#pinSteps .ps-dot');
  const bioOption = document.getElementById('bioOption');

  function updateDots() {
    dots.forEach((d, i) => {
      d.classList.toggle('filled', i < pin.length);
      d.classList.remove('error');
    });
  }

  function shake() {
    dots.forEach(d => d.classList.add('error'));
    dotsContainer.classList.add('shake');
    setTimeout(() => {
      dotsContainer.classList.remove('shake');
      dots.forEach(d => d.classList.remove('error'));
      pin = '';
      updateDots();
    }, 500);
  }

  function goToStage2() {
    stage = 2;
    firstPin = pin;
    pin = '';
    updateDots();
    stageEl.textContent = 'Подтверждение';
    titleEl.textContent = 'Повторите PIN';
    subEl.textContent = 'Введите тот же PIN ещё раз, чтобы убедиться, что вы его запомнили.';
    steps.forEach(s => s.classList.remove('active'));
    steps[1].classList.add('active');
  }

  function complete() {
    // Show bio option
    stageEl.textContent = 'Готово';
    titleEl.textContent = 'PIN установлен';
    subEl.textContent = 'Кошелёк защищён. Хотите включить быстрый вход через биометрию?';
    dotsContainer.style.display = 'none';
    document.getElementById('keypad').style.display = 'none';
    bioOption.style.display = 'flex';

    MDAONotif.show({
      type: 'success',
      title: 'PIN установлен',
      sub: '6 цифр · запомните их',
      pill: true,
      autoDismiss: 3000
    });
  }

  function addDigit(d) {
    if (pin.length >= PIN_LENGTH) return;
    pin += d;
    updateDots();
    if (pin.length === PIN_LENGTH) {
      setTimeout(() => {
        if (stage === 1) {
          goToStage2();
        } else {
          if (pin === firstPin) {
            complete();
          } else {
            MDAONotif.show({ type:'error', title:'PIN не совпадает', sub:'Попробуйте снова', actionLabel:'Заново', actionPrimary:true, actionCb: () => {
              stage = 1; pin = ''; firstPin = '';
              stageEl.textContent = 'Создание PIN';
              titleEl.textContent = 'Придумайте PIN';
              subEl.textContent = '6 цифр для защиты кошелька. PIN потребуется при каждом входе.';
              steps.forEach(s => s.classList.remove('active'));
              steps[0].classList.add('active');
              updateDots();
              MDAONotif.dismiss();
            }});
            shake();
          }
        }
      }, 150);
    }
  }

  function deleteDigit() {
    pin = pin.slice(0, -1);
    updateDots();
  }

  // Keys
  document.querySelectorAll('.key[data-key]').forEach(k => {
    k.addEventListener('click', () => addDigit(k.dataset.key));
  });
  document.getElementById('delBtn').addEventListener('click', deleteDigit);
  document.getElementById('bioBtn').addEventListener('click', () => {
    MDAONotif.show({ type:'info', title:'Скоро', sub:'Биометрия', pill:true });
  });

  // Bio toggle
  document.getElementById('bioToggle').addEventListener('click', (e) => {
    e.stopPropagation();
    const on = e.currentTarget.classList.toggle('on');
    if (on) {
      MDAONotif.show({ type:'success', title:'Face ID включён', sub:'Быстрый вход активирован', pill:true, autoDismiss:2000 });
      setTimeout(() => {
        MDAONotif.show({ type:'success', title:'Готово', sub:'На главный экран', pill:true, autoDismiss:1500 });
      }, 2200);
    }
  });
  document.getElementById('bioOption').addEventListener('click', (e) => {
    if (e.target.closest('.toggle')) return;
    document.getElementById('bioToggle').click();
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    MDAONotif.show({ type:'info', title:'Назад', sub:'На welcome экран', pill:true, autoDismiss:1500 });
  });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (bioOption.style.display === 'flex') return;
    if (e.key >= '0' && e.key <= '9') addDigit(e.key);
    else if (e.key === 'Backspace') deleteDigit();
  });

  updateDots();
})();
</script>
</body>
</html>
