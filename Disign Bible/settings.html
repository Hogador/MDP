<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MDAOPay — Настройки</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="transitions.css">
<link rel="stylesheet" href="components.css">
<style>
  /* Settings Hub specific */
  .settings-search {
    margin: 4px 0 14px;
  }
  .settings-search .input-wrap svg {
    width: 16px; height: 16px;
  }

  .profile-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--soft-border);
    border-radius: var(--r-2xl);
    box-shadow: var(--shadow-soft), var(--shadow-glow);
    margin-bottom: 16px;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    border: none;
  }
  .profile-card:active { transform: scale(0.985); box-shadow: var(--shadow-press); }
  .profile-card .pc-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #FF6B00, #FF9A4D);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: var(--fw-bold); color: #fff;
    flex-shrink: 0;
    box-shadow: 0 6px 14px -4px rgba(255,107,0,0.5), inset 0 1px 2px rgba(255,255,255,0.4), inset 0 -2px 4px rgba(0,0,0,0.15);
  }
  .profile-card .pc-body { flex: 1; min-width: 0; text-align: left; }
  .profile-card .pc-name {
    font-size: var(--fs-h3); font-weight: var(--fw-bold); color: var(--text);
    letter-spacing: var(--ls-snug);
  }
  .profile-card .pc-nick {
    font-size: var(--fs-body); color: var(--accent); font-weight: var(--fw-semibold);
    font-family: var(--font-mono); margin-top: 2px;
  }
  .profile-card .pc-disc {
    font-size: var(--fs-meta); color: var(--text2); margin-top: 4px;
  }
  .profile-card .pc-chevron {
    stroke: var(--text3); stroke-width: 2.4; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
    width: 20px; height: 20px; flex-shrink: 0;
  }

  .security-warn {
    display: flex; align-items: center; gap: 10px;
    background: var(--warning-soft);
    border: 1px solid rgba(255,179,0,0.2);
    border-radius: var(--r-lg);
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: var(--fs-label); color: var(--text);
    line-height: var(--lh-normal);
  }
  .security-warn svg {
    stroke: var(--warning); stroke-width: 2; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
    width: 18px; height: 18px; flex-shrink: 0;
  }
  .security-warn b { color: var(--warning); font-weight: var(--fw-bold); }

  .version-block {
    text-align: center; padding: 20px 0 8px;
    color: var(--text3);
    font-size: var(--fs-label);
  }
  .version-block .vb-logo {
    display: inline-block;
    font-size: var(--fs-h2); font-weight: var(--fw-bold);
    color: var(--accent); letter-spacing: var(--ls-tight);
    margin-bottom: 6px;
  }
  .version-block .vb-version { font-family: var(--font-mono); }
</style>
</head>
<body class="theme-dark">
<div class="phone theme-dark" id="phone">

  <!-- Topbar -->
  <div class="topbar">
    <button class="back-btn" id="backBtn" aria-label="Назад">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="title">Настройки</div>
    <button class="action-btn" aria-label="Поиск" style="display:none;">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </button>
  </div>

  <!-- Scroll area -->
  <div class="scroll-area content-wrap" id="contentWrap">

    <!-- Profile card -->
    <button class="profile-card" data-target="profile.html">
      <div class="pc-avatar">А</div>
      <div class="pc-body">
        <div class="pc-name">Антон</div>
        <div class="pc-nick">@crazy-cherry</div>
        <div class="pc-disc">Дискриминатор: #2215</div>
      </div>
      <svg class="pc-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <!-- Security warning (if backup not done) -->
    <div class="security-warn" data-target="backup.html" style="cursor:pointer;">
      <svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
      <span><b>Резервная копия не создана</b> · Сделайте backup, чтобы не потерять доступ</span>
    </div>

    <!-- ACCOUNT section -->
    <div class="list-section-header">Аккаунт</div>
    <div class="list-section">
      <button class="list-item" data-target="profile.html">
        <div class="li-icon accent">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v2"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Профиль</div>
          <div class="li-sub">Ник, адрес, QR-код</div>
        </div>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <button class="list-item" data-target="security.html">
        <div class="li-icon success">
          <svg viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5 4 9 9 10 5-1 9-5 9-10V7l-9-5z"/><path d="M9 12l2 2 4-4"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Безопасность</div>
          <div class="li-sub">PIN, биометрия, автоблокировка</div>
        </div>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <button class="list-item" data-target="backup.html">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Резервная копия</div>
          <div class="li-sub">Recovery phrase, экспорт</div>
        </div>
        <span class="badge-pill warning">!</span>
      </button>
    </div>

    <!-- APPEARANCE section -->
    <div class="list-section-header">Внешний вид</div>
    <div class="list-section">
      <button class="list-item" data-target="appearance.html">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Тема</div>
        </div>
        <span class="li-value" id="themeValue">Тёмная</span>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <button class="list-item" data-target="appearance.html#accent">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 22a10 10 0 1 1 0-20"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Акцентный цвет</div>
        </div>
        <span class="li-value" style="display:flex;align-items:center;gap:6px;">
          <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 1px var(--soft-border);"></span>
          Оранжевый
        </span>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <button class="list-item" data-target="notifications.html">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Уведомления</div>
          <div class="li-sub">Push, категории, тихие часы</div>
        </div>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <button class="list-item" data-target="language.html">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20z"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Язык</div>
        </div>
        <span class="li-value">Русский</span>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- WALLET section -->
    <div class="list-section-header">Кошелёк</div>
    <div class="list-section">
      <button class="list-item" data-target="networks.html">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Сети</div>
          <div class="li-sub">RPC, эксплореры</div>
        </div>
        <span class="li-value">BNB Chain</span>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <button class="list-item" data-target="wallets-tokens.html">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="3"/><path d="M2 10h20"/><circle cx="16" cy="15" r="1.5"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Кошельки и токены</div>
          <div class="li-sub">Аккаунты, скрытые токены</div>
        </div>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- SUPPORT section -->
    <div class="list-section-header">Поддержка</div>
    <div class="list-section">
      <button class="list-item" data-target="help.html">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">Помощь и FAQ</div>
        </div>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <button class="list-item" data-target="about.html">
        <div class="li-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </div>
        <div class="li-body">
          <div class="li-title">О приложении</div>
          <div class="li-sub">Версия, лицензии, статус</div>
        </div>
        <svg class="li-chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- Version -->
    <div class="version-block">
      <div class="vb-logo">MDAOPay</div>
      <div>Версия <span class="vb-version">1.0.0 (build 2215)</span></div>
    </div>

    <!-- Notification zone (reused from main screen pattern) -->
    <div class="notif-zone" id="notifZone">
      <div class="notif-wave" id="notifWave"></div>
      <div class="notif" id="notif">
        <div class="notif-content">
          <div class="notif-row">
            <div class="notif-icon info" id="notifIcon"></div>
            <div class="notif-body">
              <div class="notif-title" id="notifTitle">Готово</div>
              <div class="notif-sub" id="notifSub"></div>
            </div>
          </div>
          <div class="notif-details">
            <div class="notif-amount" id="notifAmount"></div>
            <div class="notif-commission" id="notifCommission"></div>
          </div>
          <button class="notif-action" id="notifAction">Готово</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ============ STATE ============
  let isNotifOpen = false;
  let notifTimer = null;
  let currentTheme = 'dark';
  let lastNotifAction = null;

  // ============ DOM ============
  const phone = document.getElementById('phone');
  const contentWrap = document.getElementById('contentWrap');
  const notif = document.getElementById('notif');
  const notifWave = document.getElementById('notifWave');
  const notifIcon = document.getElementById('notifIcon');
  const notifTitle = document.getElementById('notifTitle');
  const notifSub = document.getElementById('notifSub');
  const notifAmount = document.getElementById('notifAmount');
  const notifCommission = document.getElementById('notifCommission');
  const notifAction = document.getElementById('notifAction');
  const themeValue = document.getElementById('themeValue');

  // ============ NOTIFICATION SYSTEM ============
  const ICONS = {
    success: '<svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>',
    error:   '<svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>',
    info:    '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke-width="2.4"/><path d="M12 11v5"/><circle cx="12" cy="8" r="0.6" fill="#fff" stroke="none"/></svg>'
  };

  function showNotif(opts) {
    if (isNotifOpen) {
      dismissNotif();
      setTimeout(() => showNotif(opts), 380);
      return;
    }
    const type = opts.type || 'info';
    const usePill = opts.pill !== undefined ? opts.pill : (type === 'info' && !opts.amount && !opts.commission && !opts.actionLabel);

    notifIcon.className = `notif-icon ${type}`;
    notifIcon.innerHTML = ICONS[type] || ICONS.info;
    notifTitle.textContent = opts.title || '';
    notifSub.textContent = opts.sub || '';

    notif.classList.toggle('pill', usePill);

    if (usePill) {
      notif.classList.remove('has-details', 'has-action');
    } else {
      if (opts.amount || opts.commission) {
        notif.classList.add('has-details');
        if (opts.amount) {
          notifAmount.innerHTML = `<span class="lbl">Сумма</span><span class="val">${opts.amount}</span>`;
          notifAmount.style.display = 'flex';
        } else notifAmount.style.display = 'none';
        if (opts.commission) {
          notifCommission.innerHTML = `<span class="lbl">Комиссия</span><span class="val">${opts.commission}</span>`;
          notifCommission.style.display = 'flex';
        } else notifCommission.style.display = 'none';
      } else notif.classList.remove('has-details');

      if (!usePill && opts.actionLabel) {
        notif.classList.add('has-action');
        notifAction.textContent = opts.actionLabel;
        notifAction.classList.toggle('primary', !!opts.actionPrimary);
        lastNotifAction = opts.actionCb || null;
      } else {
        notif.classList.remove('has-action');
        lastNotifAction = null;
      }
    }

    notif.classList.remove('hide');
    void notif.offsetWidth;
    notif.classList.add('show');
    notifWave.classList.remove('show');
    void notifWave.offsetWidth;
    notifWave.classList.add('show');
    contentWrap.classList.add('shift');
    isNotifOpen = true;

    const defaultDelay = usePill ? 2600 : (type === 'error' ? 0 : 4000);
    const delay = opts.autoDismiss !== undefined ? opts.autoDismiss : defaultDelay;
    clearTimeout(notifTimer);
    if (delay > 0) notifTimer = setTimeout(dismissNotif, delay);
  }
  function dismissNotif() {
    if (!isNotifOpen) return;
    clearTimeout(notifTimer);
    notif.classList.remove('show');
    notif.classList.add('hide');
    notifWave.classList.remove('show');
    contentWrap.classList.remove('shift');
    isNotifOpen = false;
    setTimeout(() => {
      if (!isNotifOpen) { notif.classList.remove('hide'); notif.classList.remove('show'); }
    }, 420);
  }
  notif.addEventListener('click', (e) => {
    if (e.target === notifAction || notifAction.contains(e.target)) return;
    dismissNotif();
  });
  notifAction.addEventListener('click', (e) => {
    e.stopPropagation();
    const cb = lastNotifAction;
    if (cb) cb();
    else dismissNotif();
  });

  // ============ NAVIGATION (push transitions) ============
  document.querySelectorAll('[data-target]').forEach(item => {
    item.addEventListener('click', () => {
      const target = item.dataset.target;
      // In prototype: just show info notif. Real nav would do location.href = target.
      // For demonstration, simulate navigation feedback
      const label = item.querySelector('.li-title')?.textContent || item.querySelector('.pc-name')?.textContent || target;
      showNotif({
        type: 'info',
        title: 'Переход',
        sub: `Открывается: ${label}`,
        pill: true,
        autoDismiss: 1800
      });
      // In real app: window.location.href = target;
    });
  });

  // ============ BACK BUTTON ============
  document.getElementById('backBtn').addEventListener('click', () => {
    showNotif({
      type: 'info',
      title: 'Назад',
      sub: 'На главный экран',
      pill: true,
      autoDismiss: 1500
    });
    // In real app: history.back() or location.href = 'mdaopay_main_screen.html';
  });

  // ============ THEME DETECTION (from parent main screen) ============
  // For prototype demo: cycle through themes by tapping title
  document.querySelector('.topbar .title').addEventListener('click', () => {
    const themes = ['dark', 'light', 'amoled'];
    const idx = themes.indexOf(currentTheme);
    currentTheme = themes[(idx + 1) % themes.length];
    phone.className = `phone theme-${currentTheme}`;
    themeValue.textContent = currentTheme === 'dark' ? 'Тёмная' : currentTheme === 'light' ? 'Светлая' : 'AMOLED';
  });

  console.log('%cMDAOPay', 'color:#FF6B00;font-size:18px;font-weight:bold', '— Settings Hub loaded. Tap title to cycle theme.');
})();
</script>
</body>
</html>
